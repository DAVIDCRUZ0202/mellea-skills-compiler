taxonomies:
  - id: ibm-graniteclaw-control-mappings
    name: IBM GraniteClaw Draft Pipeline Mapping
    type: RiskControlGroupTaxonomy
    description: >-
      IBM GraniteClaw Draft Pipeline Mapping creates static mapping between existing governance action IDs and
      granite claw pipeline controls
    url: https://github.com/ibm/granite-claw
    dateCreated: 2026-03-25
    version: "1"
groups:
  - id: ibm-graniteclaw-cm-group-implemented
    name: Implemented
    description: >-
     Implemented (count toward AUTOMATED/PARTIAL).
    narrower:
      - pc-content-safety
      - pc-input-screening
      - pc-generation-audit
      - pc-component-audit
      - pc-validation-audit
      - pc-latency-monitoring
      - pc-incident-flagging
      - pc-policy-traceability
    type: RiskControlGroup
    isDefinedByTaxonomy: ibm-graniteclaw-control-mappings
  - id: ibm-graniteclaw-cm-group-organisational
    name: Organisational
    description: >-
      Organisational (always -> MANUAL).
    narrower:
      - pc-org-policy
      - pc-org-training
      - pc-org-legal
      - pc-org-oversight
      - pc-org-vendor
      - pc-org-decommission
    type: RiskControlGroup
    isDefinedByTaxonomy: ibm-graniteclaw-control-mappings
  - id: ibm-graniteclaw-cm-group-gap
    name: Gap
    description: >-
     Gap (not yet implemented -> MANUAL).
    narrower:
      - pc-tool-access-governance
      - pc-sampling-audit
      - pc-enforcement
    type: RiskControlGroup
    isDefinedByTaxonomy: ibm-graniteclaw-control-mappings
  - id: pc-content-safety
    name: pc-content-safety
    description: >-
      Guardian risk checks on every LLM output
    type: RiskControlGroup
    broader:
      - ibm-graniteclaw-cm-group-implemented
    isDefinedByTaxonomy: ibm-graniteclaw-control-mappings
  - id: pc-input-screening
    name: pc-input-screening
    description: >-
      Guardian risk checks on input prompts
    type: RiskControlGroup
    broader:
      - ibm-graniteclaw-cm-group-implemented
    isDefinedByTaxonomy: ibm-graniteclaw-control-mappings
  - id: pc-generation-audit
    name: pc-generation-audit
    description: >-
      JSONL logging of every LLM input/output
    type: RiskControlGroup
    broader:
      - ibm-graniteclaw-cm-group-implemented
    isDefinedByTaxonomy: ibm-graniteclaw-control-mappings
  - id: pc-component-audit
    name: pc-component-audit
    description: >-
      JSONL logging of component lifecycle events
    type: RiskControlGroup
    broader:
      - ibm-graniteclaw-cm-group-implemented
    isDefinedByTaxonomy: ibm-graniteclaw-control-mappings
  - id: pc-validation-audit
    name: pc-validation-audit
