      Tracks LLM call latency per generation event
    type: RiskControlGroup
    broader:
      - ibm-graniteclaw-cm-group-implemented
    isDefinedByTaxonomy: ibm-graniteclaw-control-mappings
  - id: pc-incident-flagging
