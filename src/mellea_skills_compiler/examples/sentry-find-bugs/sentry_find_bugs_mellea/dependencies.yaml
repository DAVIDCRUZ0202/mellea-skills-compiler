    category: c6_tools
    disposition: real_impl
    target: main.py:gather_diff
    description: >
      Gathers the git diff of the current branch vs the default branch.
      Implemented using git and gh CLI subprocesses.
    prerequisites:
      - git CLI installed and available on PATH
      - gh CLI (GitHub CLI) installed and authenticated
      - Working directory must be inside a git repository

